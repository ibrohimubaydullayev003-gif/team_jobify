{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4><i class="bi bi-box-arrow-in-right"></i> Kirish</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Kirish</button>
                </form>
                <p class="mt-3 text-center">
                    Hisobingiz yo‘qmi? <a href="{% url 'accounts:register' %}">Ro‘yxatdan o‘tish</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
