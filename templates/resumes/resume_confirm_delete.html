{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-exclamation-triangle"></i> Rezyumeni o‘chirish</h4>
            </div>
            <div class="card-body">
                <p class="lead">Siz <strong>"{{ resume.title }}"</strong> rezyumesini o‘chirmoqchimisiz?</p>
                <p class="text-muted">Bu amalni qaytarib bo‘lmaydi!</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Ha, o‘chirish</button>
                    <a href="{% url 'resumes:list' %}" class="btn btn-secondary">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
